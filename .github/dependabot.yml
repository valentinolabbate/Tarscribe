version: 2
updates:
  - package-ecosystem: npm
    directory: /desktop
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: monthly
      day: monday
      time: "09:15"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    schedule:
      interval: monthly
      day: monday
      time: "09:30"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      rust-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:45"
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
