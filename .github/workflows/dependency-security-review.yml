name: Monthly dependency security review

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create monthly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const month = new Date().toISOString().slice(0, 7);
            const title = `Dependency Security Review ${month}`;
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            if (open.some((issue) => issue.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                "Monatlicher Dependency- und Advisory-Review.",
                "",
                "- [ ] Dependabot- und GitHub-Security-Advisories geprüft",
                "- [ ] npm-, uv-, Cargo- und Actions-Updates geprüft",
                "- [ ] Major-Updates separat bewertet",
                "- [ ] CI für angenommene Updates grün",
                "- [ ] Verschobene Updates und Risiken dokumentiert",
                "",
                "Details: `.github/DEPENDENCY_REVIEW.md`",
              ].join("\n"),
            });
