name: Release

# Push a version tag (e.g. v0.2.0) to build the macOS app, sign the update
# artifacts, and publish a GitHub Release with latest.json for the auto-updater.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-14 # Apple Silicon runner
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Stage backend + uv resources
        working-directory: desktop
        run: ./scripts/stage-resources.sh

      - name: Prepare release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          OBJECT_TYPE="$(git cat-file -t "refs/tags/$TAG" 2>/dev/null || true)"

          if [[ "$OBJECT_TYPE" == "tag" ]]; then
            git for-each-ref "refs/tags/$TAG" --format='%(contents)' > "$NOTES_FILE"
          else
            PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
            {
              echo "## Änderungen"
              echo
              if [[ -n "$PREVIOUS_TAG" ]]; then
                git log -n 12 --no-merges --pretty=format:'- %s' "${PREVIOUS_TAG}..${TAG}"
              else
                git log -n 12 --no-merges --pretty=format:'- %s' "${TAG}"
              fi
              echo
              echo
              echo "_Automatisch aus den Commits erzeugt. Für präzisere Release Notes einen annotierten Tag verwenden._"
            } > "$NOTES_FILE"
          fi

          if ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            {
              echo "## Änderungen"
              echo
              echo "- Wartungsrelease mit Stabilitäts- und Detailverbesserungen."
            } > "$NOTES_FILE"
          fi

          {
            echo
            echo "---"
            echo "Die App aktualisiert sich selbst über den signierten macOS-Updater."
          } >> "$NOTES_FILE"

          {
            echo "body<<__TARSCRIBE_RELEASE_NOTES__"
            cat "$NOTES_FILE"
            echo "__TARSCRIBE_RELEASE_NOTES__"
          } >> "$GITHUB_OUTPUT"

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Tarscribe ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Build enhanced DMG with install script
        run: ./scripts/build-dmg.sh

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('desktop/src-tauri/tauri.conf.json'))['version'])")
          DMG="desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Tarscribe_${VERSION}_aarch64.dmg"
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber
